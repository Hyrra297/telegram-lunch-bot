# fly.toml — generated for Fly.io free tier
app = "telegram-lunch-bot"
primary_region = "sin"  # Singapore — gần Việt Nam nhất

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/lunch_bot.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "lunch_data"
  destination = "/data"
